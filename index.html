<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Programa 2026 - Ypacaraí</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfZe7h1Iyiw0IMyNpceWuDhdWoem4YKOg",
            authDomain: "programa-rfs.firebaseapp.com",
            projectId: "programa-rfs",
            storageBucket: "programa-rfs.firebasestorage.app",
            messagingSenderId: "760528154663",
            appId: "1:760528154663:web:33018fe1175fc353d95e02"
        };

        window.appData = {};
        window.isEditing = false;
        window.currentMonth = 'Abril';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.docRef = doc(db, "programa_rfs", "datos_2026");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('status').innerHTML = '● EN LÍNEA';
                onSnapshot(window.docRef, (docSnap) => {
                    if (docSnap.exists() && !window.isEditing) {
                        window.appData = docSnap.data();
                        window.renderApp();
                    }
                });
            }
        });
        signInAnonymously(auth);
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        .tab-active { background: white; color: #4338ca; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        input { background: transparent; width: 100%; outline: none; border-bottom: 1px solid #e2e8f0; }
        input:focus { border-bottom-color: #4338ca; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden">
        <header class="p-8 border-b border-slate-50">
            <div class="flex justify-between items-start">
                <div>
                    <h1 class="text-4xl font-extrabold italic text-slate-800 tracking-tight">PROGRAMA <span class="text-indigo-600">2026</span></h1>
                    <p class="text-slate-500 font-semibold mt-1">Reunión fin de semana – Ypacaraí español</p>
                    <p id="status" class="text-[10px] font-bold text-green-500 mt-2">CONECTANDO...</p>
                </div>
                <button id="edit-btn" onclick="toggleEdit()" class="no-print px-6 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm">EDITAR</button>
            </div>
        </header>

        <nav id="month-tabs" class="no-print flex gap-2 p-4 bg-slate-50/50 overflow-x-auto"></nav>

        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="text-[11px] font-black uppercase text-slate-400 tracking-widest border-b border-slate-100">
                        <th class="p-6 text-center">Fecha</th>
                        <th class="p-6">Presidente</th>
                        <th class="p-6">Discurso Local</th>
                        <th class="p-6">Lector</th>
                        <th class="p-6">Salida Oradores</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black italic uppercase">Recordatorio</h2>
                    <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
                </div>
                <div id="modal-text" class="bg-slate-50 p-6 rounded-2xl font-medium text-slate-700 whitespace-pre-wrap text-sm leading-relaxed border border-slate-100"></div>
                <button onclick="copyText()" class="w-full mt-6 py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 flex items-center justify-center gap-2">
                    <i data-lucide="copy" class="w-5 h-5"></i> COPIAR PARA WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <datalist id="hermanos">
        <option value="Abel Benitez"><option value="Luis Cáceres"><option value="Damián Rizzi"><option value="Daniel Díaz"><option value="Claudio Bauer"><option value="Amancio Candia"><option value="Santiago Barreto"><option value="Thiago Torres"><option value="Diego Rizzi"><option value="Carlos Barreto">
    </datalist>

    <script>
        const months = ['Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        
        window.toggleEdit = () => {
            if(!window.isEditing) {
                if(prompt("Clave:") === "2026") { window.isEditing = true; window.renderApp(); }
            } else { window.isEditing = false; window.renderApp(); }
            document.getElementById('edit-btn').innerText = window.isEditing ? 'LISTO' : 'EDITAR';
        };

        window.updateVal = async (idx, field, val) => {
            window.appData[window.currentMonth][idx][field] = val;
            const { setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            await setDoc(window.docRef, window.appData);
        };

        window.setMonth = (m) => { window.currentMonth = m; window.renderApp(); };

        window.renderApp = function() {
            const tabs = document.getElementById('month-tabs');
            tabs.innerHTML = months.map(m => `
                <button onclick="setMonth('${m}')" class="px-5 py-2 rounded-xl text-xs font-bold uppercase transition-all ${window.currentMonth === m ? 'tab-active' : 'text-slate-400'}">${m}</button>
            `).join('');

            const body = document.getElementById('table-body');
            body.innerHTML = window.appData[window.currentMonth]?.map((row, i) => `
                <tr class="border-b border-slate-50 group hover:bg-slate-50/50 transition-colors">
                    <td class="p-6 text-center border-r border-slate-50">
                        <div class="text-2xl font-black text-slate-800 leading-none">${row.d}</div>
                        <div class="text-[10px] font-bold text-slate-400 uppercase mt-1">${window.currentMonth}</div>
                    </td>
                    <td class="p-6">
                        <div class="flex items-center gap-3">
                            <i data-lucide="user" class="w-4 h-4 text-slate-300"></i>
                            ${window.isEditing ? `<input list="hermanos" value="${row.p}" onchange="updateVal(${i}, 'p', this.value)">` : `<span class="font-bold text-slate-700 uppercase text-sm">${row.p || '-'}</span>`}
                        </div>
                        <button onclick="openLocalModal(${i})" class="mt-4 p-2 text-slate-300 hover:text-indigo-600 transition-colors no-print"><i data-lucide="bell" class="w-4 h-4"></i></button>
                    </td>
                    <td class="p-6">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="users" class="w-4 h-4 text-slate-300"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.o}" onchange="updateVal(${i}, 'o', this.value)">` : `<span class="font-bold text-slate-800 uppercase text-sm">${row.o || '-'}</span>`}
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="book-open" class="w-4 h-4 text-slate-300"></i>
                                ${window.isEditing ? `<input value="${row.t}" placeholder="Tema..." onchange="updateVal(${i}, 't', this.value)">` : `<span class="text-xs italic text-slate-500">${row.t || '-'}</span>`}
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-4 h-4 text-slate-300"></i>
                                ${window.isEditing ? `<input value="${row.c}" onchange="updateVal(${i}, 'c', this.value)">` : `<span class="text-[10px] font-bold text-slate-400 uppercase">${row.c || 'YPACARAÍ'}</span>`}
                            </div>
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="flex items-center gap-2">
                            <i data-lucide="user-check" class="w-4 h-4 text-slate-300"></i>
                            ${window.isEditing ? `<input list="hermanos" value="${row.l}" onchange="updateVal(${i}, 'l', this.value)">` : `<span class="font-bold text-slate-700 uppercase text-sm">${row.l || '-'}</span>`}
                        </div>
                    </td>
                    <td class="p-6">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="user" class="w-4 h-4 text-slate-300"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.s}" onchange="updateVal(${i}, 's', this.value)">` : `<span class="font-bold text-slate-800 uppercase text-sm">${row.s || '-'}</span>`}
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="book-open" class="w-4 h-4 text-slate-300"></i>
                                ${window.isEditing ? `<input value="${row.st}" placeholder="Tema..." onchange="updateVal(${i}, 'st', this.value)">` : `<span class="text-xs italic text-slate-500">${row.st || '-'}</span>`}
                            </div>
                            <div class="pt-2 border-t border-slate-100">
                                <div class="text-[9px] font-black text-slate-400 uppercase tracking-tighter mb-1">CONGREGACIÓN</div>
                                ${window.isEditing ? `<input value="${row.sd}" onchange="updateVal(${i}, 'sd', this.value)">` : `<div class="flex justify-between items-center"><span class="font-bold text-slate-800 text-xs uppercase">${row.sd || '-'}</span> <span class="text-[10px] font-bold text-indigo-600">SÁBADO</span></div>`}
                            </div>
                        </div>
                        <button onclick="openSalidaModal(${i})" class="mt-2 p-2 text-slate-300 hover:text-indigo-600 transition-colors no-print"><i data-lucide="bell-ring" class="w-4 h-4"></i></button>
                    </td>
                </tr>
            `).join('') || '';
            lucide.createIcons();
        };

        // RECORDATORIO LOCAL
        window.openLocalModal = (idx) => {
            const row = window.appData[window.currentMonth][idx];
            const nextRow = window.appData[window.currentMonth][idx+1] || { t: 'Pendiente' };
            
            const text = `*RECORDATORIO REUNIÓN FIN DE SEMANA* 🗓️
*Fecha:* ${row.d} de ${window.currentMonth}

*Presidente:* ${row.p || '-'}
*Discurso Local:* ${row.o || '-'}
*Tema:* _"${row.t || '-'}"_
*Lector de la Atalaya:* ${row.l || '-'}

📌 *Próximo Discurso Público:* _"${nextRow.t || '-'}"_`;

            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal').classList.add('active', 'flex');
            document.getElementById('modal').classList.remove('hidden');
        };

        // RECORDATORIO SALIDA
        window.openSalidaModal = (idx) => {
            const row = window.appData[window.currentMonth][idx];
            const text = `*SALIDA DE ORADOR* 🚗
*Fecha:* ${row.d} de ${window.currentMonth}

*Orador:* ${row.s || '-'}
*Tema:* _"${row.st || '-'}"_
*Congregación:* ${row.sd || '-'}`;

            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal').classList.add('active', 'flex');
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.copyText = () => {
            const text = document.getElementById('modal-text').innerText;
            navigator.clipboard.writeText(text);
            alert("¡Copiado para WhatsApp!");
        };
    </script>
</body>
</html>
