<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Programa 2026 - Ypacaraí</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfZe7h1Iyiw0IMyNpceWuDhdWoem4YKOg",
            authDomain: "programa-rfs.firebaseapp.com",
            projectId: "programa-rfs",
            storageBucket: "programa-rfs.firebasestorage.app",
            messagingSenderId: "760528154663",
            appId: "1:760528154663:web:33018fe1175fc353d95e02"
        };

        window.appData = {};
        window.isEditing = false;
        window.currentMonth = 'Abril';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        window.docRef = doc(db, "programa_rfs", "datos_2026");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('status').innerHTML = '● EN LÍNEA';
                onSnapshot(window.docRef, (docSnap) => {
                    if (docSnap.exists() && !window.isEditing) {
                        window.appData = docSnap.data();
                        window.renderApp();
                    }
                });
            }
        });
        signInAnonymously(auth);
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        
        /* Temas por Mes */
        .theme-Abril { --accent: #4338ca; --accent-light: #e0e7ff; }
        .theme-Mayo { --accent: #047857; --accent-light: #d1fae5; }
        .theme-Junio { --accent: #b45309; --accent-light: #fef3c7; }
        .theme-Julio { --accent: #db2777; --accent-light: #fce7f3; }
        .theme-Agosto { --accent: #ca8a04; --accent-light: #fef9c3; }
        .theme-Septiembre { --accent: #0369a1; --accent-light: #e0f2fe; }
        .theme-Octubre { --accent: #9333ea; --accent-light: #f3e8ff; }
        .theme-Noviembre { --accent: #c2410c; --accent-light: #ffedd5; }
        .theme-Diciembre { --accent: #475569; --accent-light: #f1f5f9; }

        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        .accent-light-bg { background-color: var(--accent-light); }
        .tab-active { background: white; color: var(--accent); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        .icon-themed { color: var(--accent); opacity: 0.8; }
        input { background: transparent; outline: none; border-bottom: 1px solid #e2e8f0; width: 100%; }
        input:focus { border-bottom-color: var(--accent); }

        /* IMPRESIÓN LANDSCAPE OPTIMIZADA */
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            body { background: white; padding: 0; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            table { font-size: 10px; width: 100% !important; border-collapse: collapse; }
            th, td { padding: 6px !important; border: 1px solid #e2e8f0 !important; }
            .text-4xl { font-size: 22px; }
            header { padding: 15px !important; }
        }
    </style>
</head>
<body class="p-4 md:p-8" id="theme-root">

    <div class="max-w-[1400px] mx-auto bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden print-container">
        <header class="p-8 border-b border-slate-50 accent-light-bg transition-colors">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-extrabold italic text-slate-800 tracking-tight">PROGRAMA <span class="accent-text">2026</span></h1>
                    <p class="text-slate-500 font-semibold text-sm">Reunión fin de semana – Ypacaraí español</p>
                    <p id="status" class="text-[9px] font-bold text-green-500 mt-1 no-print uppercase">Conectando...</p>
                </div>
                <div class="flex gap-3 no-print">
                    <button onclick="window.print()" class="p-3 bg-white border border-slate-100 rounded-xl text-slate-400 hover:text-slate-800 transition-colors">
                        <i data-lucide="printer" class="w-5 h-5"></i>
                    </button>
                    <button id="edit-btn" onclick="toggleEdit()" class="px-6 py-2 bg-slate-900 text-white rounded-xl font-bold text-sm">EDITAR</button>
                </div>
            </div>
        </header>

        <nav id="month-tabs" class="no-print flex gap-1 p-4 bg-slate-50/30 overflow-x-auto border-b border-slate-50"></nav>

        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="text-[11px] font-black uppercase text-slate-400 tracking-widest border-b border-slate-100 bg-slate-50/50">
                        <th class="p-5 text-center w-28">Fecha</th>
                        <th class="p-5">Presidente</th>
                        <th class="p-5">Discurso Local</th>
                        <th class="p-5">Lector</th>
                        <th class="p-5 w-72">Salida Oradores</th>
                    </tr>
                </thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 items-center justify-center p-4 no-print">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black italic uppercase">WhatsApp</h2>
                <button onclick="closeModal()" class="p-2 bg-slate-100 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="modal-text" class="bg-slate-50 p-6 rounded-2xl font-medium text-slate-700 whitespace-pre-wrap text-sm leading-relaxed border-l-4 accent-border"></div>
            <button onclick="copyText()" class="w-full mt-6 py-4 accent-bg text-white font-bold rounded-2xl shadow-lg flex items-center justify-center gap-2">
                <i data-lucide="copy" class="w-5 h-5"></i> COPIAR MENSAJE
            </button>
        </div>
    </div>

    <datalist id="hermanos">
        <option value="Abel Benitez"><option value="Luis Cáceres"><option value="Damián Rizzi"><option value="Daniel Díaz"><option value="Claudio Bauer"><option value="Amancio Candia"><option value="Santiago Barreto">
    </datalist>

    <script>
        const months = ['Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        
        window.toggleEdit = () => {
            if(!window.isEditing) {
                if(prompt("Clave:") === "2026") { window.isEditing = true; window.renderApp(); }
            } else { window.isEditing = false; window.renderApp(); }
            document.getElementById('edit-btn').innerText = window.isEditing ? 'LISTO' : 'EDITAR';
        };

        window.updateVal = async (idx, field, val) => {
            window.appData[window.currentMonth][idx][field] = val;
            const { setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            await setDoc(window.docRef, window.appData);
        };

        window.setMonth = (m) => { window.currentMonth = m; window.renderApp(); };

        window.renderApp = function() {
            document.getElementById('theme-root').className = `p-4 md:p-8 theme-${window.currentMonth}`;
            const tabs = document.getElementById('month-tabs');
            tabs.innerHTML = months.map(m => `<button onclick="setMonth('${m}')" class="px-5 py-2 rounded-xl text-[10px] font-black uppercase transition-all ${window.currentMonth === m ? 'tab-active' : 'text-slate-400'}">${m}</button>`).join('');

            const body = document.getElementById('table-body');
            body.innerHTML = window.appData[window.currentMonth]?.map((row, i) => {
                const isSpecial = row.ev && row.ev.trim() !== "";
                
                return `
                <tr class="border-b border-slate-50 transition-colors">
                    <td class="p-5 text-center border-r border-slate-50 align-top">
                        <div class="text-2xl font-black text-slate-800 leading-none accent-text">${row.d}</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase mt-1">${window.currentMonth}</div>
                        <button onclick="openLocalModal(${i})" class="mt-4 p-2 bg-white border border-slate-100 rounded-lg text-slate-300 hover:accent-text transition-colors no-print"><i data-lucide="bell" class="w-4 h-4"></i></button>
                        ${window.isEditing ? `<input class="mt-2 text-[8px] text-center" placeholder="Evento?" value="${row.ev || ''}" onchange="updateVal(${i}, 'ev', this.value)">` : ''}
                    </td>
                    <td colspan="${isSpecial ? '4' : '1'}" class="p-5 align-top">
                        ${isSpecial ? `
                            <div class="flex justify-center items-center h-full py-4">
                                <span class="text-[22px] font-black uppercase italic accent-text tracking-widest text-center">${row.ev}</span>
                            </div>
                        ` : `
                            <div class="flex items-center gap-3">
                                <i data-lucide="user" class="w-4 h-4 icon-themed"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.p}" onchange="updateVal(${i}, 'p', this.value)">` : `<span class="font-bold text-slate-700 uppercase text-xs">${row.p || '-'}</span>`}
                            </div>
                        `}
                    </td>
                    ${!isSpecial ? `
                    <td class="p-5 align-top">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="users" class="w-4 h-4 icon-themed"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.o}" onchange="updateVal(${i}, 'o', this.value)">` : `<span class="font-bold text-slate-800 uppercase text-xs">${row.o || '-'}</span>`}
                            </div>
                            <div class="flex items-start gap-2">
                                <i data-lucide="book-open" class="w-4 h-4 icon-themed mt-0.5"></i>
                                ${window.isEditing ? `<input value="${row.t}" placeholder="Tema..." onchange="updateVal(${i}, 't', this.value)">` : `<span class="text-[11px] italic text-slate-500 leading-tight">${row.t || '-'}</span>`}
                            </div>
                            <div class="flex items-center gap-2">
                                <i data-lucide="map-pin" class="w-4 h-4 icon-themed"></i>
                                ${window.isEditing ? `<input value="${row.c}" onchange="updateVal(${i}, 'c', this.value)">` : `<span class="text-[9px] font-black text-slate-400 uppercase">${row.c || 'YPACARAÍ'}</span>`}
                            </div>
                        </div>
                    </td>
                    <td class="p-5 align-top">
                        <div class="flex items-center gap-2">
                            <i data-lucide="user-check" class="w-4 h-4 icon-themed"></i>
                            ${window.isEditing ? `<input list="hermanos" value="${row.l}" onchange="updateVal(${i}, 'l', this.value)">` : `<span class="font-bold text-slate-700 uppercase text-xs">${row.l || '-'}</span>`}
                        </div>
                    </td>
                    <td class="p-5 align-top border-l border-slate-50">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="plane-takeoff" class="w-4 h-4 icon-themed"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.s}" onchange="updateVal(${i}, 's', this.value)">` : `<span class="font-bold text-slate-800 uppercase text-xs">${row.s || '-'}</span>`}
                            </div>
                            <div class="flex items-start gap-2">
                                <i data-lucide="book-open" class="w-4 h-4 icon-themed mt-0.5"></i>
                                ${window.isEditing ? `<input value="${row.st}" placeholder="Tema..." onchange="updateVal(${i}, 'st', this.value)">` : `<span class="text-[11px] italic text-slate-500 leading-tight">${row.st || '-'}</span>`}
                            </div>
                            <div class="pt-2 border-t border-slate-100 flex justify-between items-end">
                                <div>
                                    <div class="text-[8px] font-black text-slate-300 uppercase mb-0.5">CONGREGACIÓN</div>
                                    ${window.isEditing ? `<input value="${row.sd}" onchange="updateVal(${i}, 'sd', this.value)">` : `<span class="font-bold text-slate-800 text-[11px] uppercase">${row.sd || '-'}</span>`}
                                </div>
                                <button onclick="openSalidaModal(${i})" class="p-2 text-slate-300 hover:accent-text no-print"><i data-lucide="bell-ring" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </td>
                    ` : ''}
                </tr>
            `).join('') || '';
            lucide.createIcons();
        };

        window.openLocalModal = (idx) => {
            const currentMonthData = window.appData[window.currentMonth];
            const row = currentMonthData[idx];
            let nextTheme = "Pendiente";
            if (idx + 1 < currentMonthData.length) { nextTheme = currentMonthData[idx+1].t || "Pendiente"; }
            else {
                const nextMonth = months[months.indexOf(window.currentMonth) + 1];
                if (nextMonth && window.appData[nextMonth]) nextTheme = window.appData[nextMonth][0].t || "Pendiente";
            }
            
            const text = `*RECORDATORIO REUNIÓN FIN DE SEMANA* 🗓️\n*Fecha:* ${row.d} de ${window.currentMonth}\n\n*Presidente:* ${row.p || '-'}\n*Discurso Local:* ${row.o || '-'}\n*Tema:* _"${row.t || '-'}"_\n*Lector:* ${row.l || '-'}\n\n📌 *Próximo Discurso:* _"${nextTheme}"_`;
            showModal(text);
        };

        window.openSalidaModal = (idx) => {
            const row = window.appData[window.currentMonth][idx];
            const text = `*SALIDA DE ORADOR* 🚗\n*Fecha:* ${row.d} de ${window.currentMonth}\n\n*Orador:* ${row.s || '-'}\n*Tema:* _"${row.st || '-'}"_\n*Congregación:* ${row.sd || '-'}`;
            showModal(text);
        };

        const showModal = (t) => { document.getElementById('modal-text').innerText = t; document.getElementById('modal').classList.remove('hidden'); document.getElementById('modal').classList.add('flex'); };
        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        window.copyText = () => { navigator.clipboard.writeText(document.getElementById('modal-text').innerText); alert("Copiado!"); };
    </script>
</body>
</html>
