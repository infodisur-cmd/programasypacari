<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Programa RFS 2026</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfZe7h1Iyiw0IMyNpceWuDhdWoem4YKOg",
            authDomain: "programa-rfs.firebaseapp.com",
            projectId: "programa-rfs",
            storageBucket: "programa-rfs.firebasestorage.app",
            messagingSenderId: "760528154663",
            appId: "1:760528154663:web:33018fe1175fc353d95e02"
        };

        window.appData = {};
        window.isEditing = false;
        window.currentMonth = 'Abril';

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // CORRECCIÓN DE RUTA: Según tu captura de Firestore
        window.docRef = doc(db, "programa_rfs", "datos_2026");

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('status').innerHTML = '● EN LÍNEA';
                onSnapshot(window.docRef, (docSnap) => {
                    if (docSnap.exists() && !window.isEditing) {
                        window.appData = docSnap.data();
                        window.renderApp();
                    }
                });
            }
        });
        signInAnonymously(auth);
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; color: #1e293b; }
        
        /* Temas por Mes */
        .theme-Abril { --accent: #4338ca; --accent-light: #e0e7ff; }
        .theme-Mayo { --accent: #047857; --accent-light: #d1fae5; }
        .theme-Junio { --accent: #b45309; --accent-light: #fef3c7; }
        .theme-Julio { --accent: #db2777; --accent-light: #fce7f3; }
        .theme-Agosto { --accent: #ca8a04; --accent-light: #fef9c3; }
        .theme-Septiembre { --accent: #0369a1; --accent-light: #e0f2fe; }
        .theme-Octubre { --accent: #9333ea; --accent-light: #f3e8ff; }
        .theme-Noviembre { --accent: #c2410c; --accent-light: #ffedd5; }
        .theme-Diciembre { --accent: #475569; --accent-light: #f1f5f9; }

        .accent-text { color: var(--accent); }
        .accent-bg { background-color: var(--accent); }
        .accent-light-bg { background-color: var(--accent-light); }
        .icon-themed { color: var(--accent); opacity: 0.8; }

        /* IMPRESIÓN LANDSCAPE */
        @media print {
            @page { size: landscape; margin: 0.5cm; }
            .no-print { display: none !important; }
            .print-container { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            table { font-size: 10px; width: 100% !important; border-collapse: collapse; }
            th, td { padding: 6px !important; border: 1px solid #e2e8f0 !important; }
        }
    </style>
</head>
<body class="p-4" id="theme-root">

    <div class="max-w-[1400px] mx-auto bg-white rounded-[2rem] shadow-sm border border-slate-100 overflow-hidden print-container">
        <header class="p-8 accent-light-bg transition-colors">
            <div class="flex justify-between items-center">
                <div>
                    <h1 class="text-4xl font-extrabold italic text-slate-800">PROGRAMA <span class="accent-text">2026</span></h1>
                    <p id="status" class="text-[10px] font-bold text-green-500 uppercase">Conectando...</p>
                </div>
                <div class="flex gap-3 no-print">
                    <button onclick="window.print()" class="p-3 bg-white rounded-xl border"><i data-lucide="printer" class="w-5 h-5 text-slate-400"></i></button>
                    <button id="edit-btn" onclick="toggleEdit()" class="px-6 py-2 bg-slate-900 text-white rounded-xl font-bold">EDITAR</button>
                </div>
            </div>
        </header>

        <nav id="month-tabs" class="no-print flex gap-1 p-4 bg-slate-50/50 overflow-x-auto"></nav>

        <table class="w-full text-left">
            <thead>
                <tr class="text-[11px] font-black uppercase text-slate-400 bg-slate-50/50">
                    <th class="p-5 text-center w-28">Fecha</th>
                    <th class="p-5">Presidente</th>
                    <th class="p-5">Discurso Local</th>
                    <th class="p-5">Lector</th>
                    <th class="p-5 w-72">Salidas</th>
                </tr>
            </thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 items-center justify-center p-4 no-print">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-8">
            <h2 class="text-xl font-black uppercase mb-4 italic">Mensaje</h2>
            <div id="modal-text" class="bg-slate-50 p-6 rounded-2xl text-sm whitespace-pre-wrap border-l-4 accent-border"></div>
            <button onclick="copyText()" class="w-full mt-6 py-4 accent-bg text-white font-bold rounded-2xl">COPIAR MENSAJE</button>
            <button onclick="closeModal()" class="w-full mt-2 py-2 text-slate-400 text-xs font-bold">CERRAR</button>
        </div>
    </div>

    <datalist id="hermanos">
        <option value="Abel Benitez"><option value="Luis Cáceres"><option value="Damián Rizzi"><option value="Daniel Díaz"><option value="Claudio Bauer"><option value="Amancio Candia"><option value="Santiago Barreto">
    </datalist>

    <script>
        const months = ['Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        
        window.toggleEdit = () => {
            if(!window.isEditing) {
                if(prompt("Clave:") === "2026") { window.isEditing = true; window.renderApp(); }
            } else { window.isEditing = false; window.renderApp(); }
            document.getElementById('edit-btn').innerText = window.isEditing ? 'LISTO' : 'EDITAR';
        };

        window.updateVal = async (idx, field, val) => {
            window.appData[window.currentMonth][idx][field] = val;
            const { setDoc } = await import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js");
            await setDoc(window.docRef, window.appData);
        };

        window.setMonth = (m) => { window.currentMonth = m; window.renderApp(); };

        window.renderApp = function() {
            document.getElementById('theme-root').className = `p-4 theme-${window.currentMonth}`;
            const tabs = document.getElementById('month-tabs');
            tabs.innerHTML = months.map(m => `<button onclick="setMonth('${m}')" class="px-4 py-2 rounded-lg text-[10px] font-black uppercase ${window.currentMonth === m ? 'bg-white shadow-sm accent-text' : 'text-slate-400'}">${m}</button>`).join('');

            const body = document.getElementById('table-body');
            body.innerHTML = window.appData[window.currentMonth]?.map((row, i) => {
                const isSpecial = row.ev && row.ev.trim() !== "";
                return `
                <tr class="border-b border-slate-50">
                    <td class="p-5 text-center border-r align-top">
                        <div class="text-2xl font-black accent-text">${row.d}</div>
                        <div class="text-[9px] font-bold text-slate-400 uppercase">${window.currentMonth}</div>
                        <button onclick="openLocalModal(${i})" class="mt-4 p-2 text-slate-300 hover:accent-text no-print"><i data-lucide="bell" class="w-4 h-4"></i></button>
                        ${window.isEditing ? `<input class="mt-2 text-[8px] text-center" placeholder="¿Evento?" value="${row.ev || ''}" onchange="updateVal(${i}, 'ev', this.value)">` : ''}
                    </td>
                    ${isSpecial ? `
                    <td colspan="4" class="p-10 text-center">
                        <div class="text-[24px] font-black italic uppercase accent-text tracking-widest">${row.ev}</div>
                    </td>` : `
                    <td class="p-5 align-top">
                        <div class="flex items-center gap-2">
                            <i data-lucide="user" class="w-4 h-4 icon-themed"></i>
                            ${window.isEditing ? `<input list="hermanos" value="${row.p}" onchange="updateVal(${i}, 'p', this.value)">` : `<span class="font-bold text-xs uppercase">${row.p || '-'}</span>`}
                        </div>
                    </td>
                    <td class="p-5 align-top">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="users" class="w-4 h-4 icon-themed"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.o}" onchange="updateVal(${i}, 'o', this.value)">` : `<span class="font-bold text-xs uppercase">${row.o || '-'}</span>`}
                            </div>
                            <div class="flex items-start gap-2">
                                <i data-lucide="book-open" class="w-4 h-4 icon-themed mt-0.5"></i>
                                ${window.isEditing ? `<input value="${row.t}" placeholder="Tema..." onchange="updateVal(${i}, 't', this.value)">` : `<span class="text-[11px] italic text-slate-500">${row.t || '-'}</span>`}
                            </div>
                        </div>
                    </td>
                    <td class="p-5 align-top">
                        <div class="flex items-center gap-2">
                            <i data-lucide="user-check" class="w-4 h-4 icon-themed"></i>
                            ${window.isEditing ? `<input list="hermanos" value="${row.l}" onchange="updateVal(${i}, 'l', this.value)">` : `<span class="font-bold text-xs uppercase">${row.l || '-'}</span>`}
                        </div>
                    </td>
                    <td class="p-5 align-top border-l">
                        <div class="space-y-3">
                            <div class="flex items-center gap-2">
                                <i data-lucide="plane-takeoff" class="w-4 h-4 icon-themed"></i>
                                ${window.isEditing ? `<input list="hermanos" value="${row.s}" onchange="updateVal(${i}, 's', this.value)">` : `<span class="font-bold text-xs uppercase">${row.s || '-'}</span>`}
                            </div>
                            <div class="pt-2 flex justify-between items-end border-t border-slate-50">
                                <div>
                                    <div class="text-[8px] font-black text-slate-300">CONGREGACIÓN</div>
                                    ${window.isEditing ? `<input value="${row.sd}" onchange="updateVal(${i}, 'sd', this.value)">` : `<span class="font-bold text-[11px] uppercase">${row.sd || '-'}</span>`}
                                </div>
                                <button onclick="openSalidaModal(${i})" class="p-2 text-slate-300 hover:accent-text no-print"><i data-lucide="bell-ring" class="w-4 h-4"></i></button>
                            </div>
                        </div>
                    </td>
                    `}
                </tr>
                `;
            }).join('') || '';
            lucide.createIcons();
        };

        window.openLocalModal = (idx) => {
            const row = window.appData[window.currentMonth][idx];
            const text = `*RECORDATORIO REUNIÓN*\nFecha: ${row.d} de ${window.currentMonth}\n\nPresidente: ${row.p}\nDiscurso: ${row.o}\nTema: "${row.t}"`;
            showModal(text);
        };

        window.openSalidaModal = (idx) => {
            const row = window.appData[window.currentMonth][idx];
            const text = `*SALIDA DE ORADOR*\nFecha: ${row.d} de ${window.currentMonth}\n\nOrador: ${row.s}\nCongregación: ${row.sd}`;
            showModal(text);
        };

        const showModal = (t) => { document.getElementById('modal-text').innerText = t; document.getElementById('modal').classList.replace('hidden', 'flex'); };
        window.closeModal = () => document.getElementById('modal').classList.replace('flex', 'hidden');
        window.copyText = () => { navigator.clipboard.writeText(document.getElementById('modal-text').innerText); alert("Copiado!"); };
    </script>
</body>
</html>
